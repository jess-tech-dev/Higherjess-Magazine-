<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higherjess Magazine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0A192F; color: #ffffff; }
        .desktop-dropdown:hover .desktop-dropdown-menu { display: block; }
    </style>
</head>
<body class="font-sans antialiased flex flex-col min-h-screen relative overflow-x-hidden">

    <header class="hidden lg:block border-b border-gray-800 bg-[#0A192F]/95 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="filterData('all')">
                <img src="android-chrome-512x512.jpg" alt="HJ" class="w-10 h-10 object-cover rounded border border-gray-800" onerror="this.style.display='none'">
                <span class="text-xl font-black tracking-tight">Higherjess <span class="text-[#FF9F43]">Magazine</span></span>
            </div>
            <div class="text-xs font-mono text-gray-400">ceo@higherjess.com</div>
        </div>

        <nav class="bg-[#071120] border-t border-gray-900">
            <div class="max-w-7xl mx-auto px-4 flex items-center space-x-1 text-sm font-medium">
                <button onclick="filterData('all')" class="px-4 py-3 text-gray-300 hover:text-[#FF9F43] transition">🏠 Home</button>
                <div id="desktop-menu-hook" class="flex space-x-1"></div>
                <button onclick="filterData('About')" class="px-4 py-3 text-gray-300 hover:text-[#FF9F43] transition">ℹ️ About</button>
            </div>
        </nav>
    </header>


    <header class="lg:hidden border-b border-gray-800 bg-[#071120] sticky top-0 z-50 px-4 h-16 flex items-center justify-between">
        <div class="flex items-center space-x-2 cursor-pointer" onclick="filterData('all')">
            <img src="android-chrome-512x512.jpg" alt="HJ" class="w-8 h-8 object-cover rounded" onerror="this.style.display='none'">
            <span class="text-base font-black tracking-tight">Higherjess <span class="text-[#FF9F43]">Mag</span></span>
        </div>
        
        <button onclick="toggleMobileDrawer(true)" class="p-2 text-gray-300 hover:text-[#FF9F43]" aria-label="Open Menu">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>
    </header>


    <div id="mobile-drawer" class="fixed inset-y-0 right-0 w-80 max-w-full bg-[#071120] z-50 border-l border-gray-800 shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col lg:hidden">
        <div class="p-4 border-b border-gray-800 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <img src="android-chrome-512x512.jpg" alt="" class="w-6 h-6 rounded">
                <span class="font-bold text-xs text-[#FF9F43] font-mono">Navigation Menu</span>
            </div>
            <button onclick="toggleMobileDrawer(false)" class="text-gray-400 hover:text-white text-xl p-2 font-mono">&times;</button>
        </div>
        
        <div id="mobile-menu-hook" class="flex-grow overflow-y-auto p-4 space-y-2 text-sm"></div>
        
        <div class="p-4 border-t border-gray-900 bg-[#0A192F]/50 text-center">
            <button onclick="toggleMobileDrawer(false); filterData('About');" class="w-full text-center py-2.5 bg-gray-900 border border-gray-800 text-xs rounded hover:text-[#FF9F43] transition">ℹ️ Corporate About Details</button>
        </div>
    </div>


    <main class="flex-grow max-w-7xl w-full mx-auto px-4 lg:px-6 py-6">
        
        <section id="hero-branding-block" class="mb-10"></section>
        
        <div class="border-b border-gray-800 pb-4 mb-6 flex justify-between items-center">
            <h2 id="view-title" class="text-xl lg:text-2xl font-black tracking-tight text-white">Latest Editorial Pieces</h2>
            <span id="items-counter" class="text-xs font-mono bg-gray-900 text-gray-400 px-3 py-1 rounded border border-gray-800"></span>
        </div>

        <section id="articles-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></section>
    </main>


    <footer class="bg-[#071120] border-t border-gray-800 py-12 text-sm text-gray-400">
        <div class="max-w-7xl mx-auto px-6 text-center space-y-4">
            <p>&copy; 2026 Higherjess Business. All rights reserved.</p>
            <div class="flex justify-center space-x-6 text-xs text-gray-500 font-mono">
                <a href="https://www.higherjess.com" target="_blank" class="hover:underline">higherjess.com</a>
                <a href="https://academia.higherjess.com" target="_blank" class="hover:underline">academia.higherjess.com</a>
            </div>
        </div>
    </footer>

    <script src="posts.js"></script>
    <script src="app.js"></script>
</body>
</html>
